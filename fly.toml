# fly.toml app configuration file generated for spiegel-corpus-api on 2026-05-28T11:29:49+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'spiegel-corpus-api'
primary_region = 'fra'

[build]

[env]
  DB_PATH = "/app/data/corpus.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
